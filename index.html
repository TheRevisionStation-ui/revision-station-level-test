<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FREE Level Test – The Revision Station</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #00C5C8;
    --teal-dark: #00a0a3;
    --purple: #9B6FD4;
    --purple-light: #c4a0f0;
    --yellow: #FFD93D;
    --coral: #FF6B6B;
    --white: #FFFFFF;
    --dark: #1a1a2e;
    --card-bg: #FFFFFF;
    --border: #1a1a2e;
    --shadow: 4px 4px 0px #1a1a2e;
    --shadow-lg: 6px 6px 0px #1a1a2e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background-color: var(--teal);
    background-image:
      radial-gradient(circle at 10% 20%, rgba(255,255,255,0.15) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(155,111,212,0.2) 0%, transparent 40%);
    min-height: 100vh;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Floating decorative elements */
  .floaties {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  .floaty {
    position: absolute;
    font-size: 2rem;
    opacity: 0.12;
    animation: float 6s ease-in-out infinite;
  }
  .floaty:nth-child(1) { top: 5%; left: 3%; animation-delay: 0s; }
  .floaty:nth-child(2) { top: 15%; right: 5%; animation-delay: 1s; }
  .floaty:nth-child(3) { top: 50%; left: 2%; animation-delay: 2s; }
  .floaty:nth-child(4) { top: 70%; right: 3%; animation-delay: 0.5s; }
  .floaty:nth-child(5) { top: 85%; left: 8%; animation-delay: 1.5s; }
  .floaty:nth-child(6) { top: 35%; right: 2%; animation-delay: 3s; }

  @keyframes float {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-15px) rotate(5deg); }
  }

  .container {
    width: 100%;
    max-width: 720px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 24px;
    animation: slideDown 0.6s ease-out;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo-img {
    width: 130px;
    height: 130px;
    object-fit: contain;
    filter: drop-shadow(3px 3px 0px rgba(0,0,0,0.3));
    margin-bottom: 8px;
  }

  .header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 6vw, 3rem);
    color: var(--white);
    text-shadow: 3px 3px 0px var(--dark);
    line-height: 1.1;
  }

  .header p {
    color: var(--dark);
    font-size: 1rem;
    font-weight: 700;
    margin-top: 8px;
    background: var(--yellow);
    display: inline-block;
    padding: 4px 14px;
    border-radius: 20px;
    border: 2px solid var(--dark);
  }

  /* PROGRESS BAR */
  .progress-wrap {
    background: var(--white);
    border: 3px solid var(--dark);
    border-radius: 50px;
    padding: 6px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    display: none;
  }
  .progress-bar {
    height: 18px;
    background: linear-gradient(90deg, var(--purple), var(--teal-dark));
    border-radius: 50px;
    transition: width 0.4s ease;
    position: relative;
    min-width: 18px;
  }
  .progress-label {
    text-align: center;
    font-weight: 800;
    font-size: 0.85rem;
    color: var(--dark);
    margin-top: 4px;
  }

  /* CARD */
  .card {
    background: var(--card-bg);
    border: 3px solid var(--dark);
    border-radius: 20px;
    padding: 28px;
    box-shadow: var(--shadow-lg);
    animation: fadeUp 0.4s ease-out;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* START SCREEN */
  .start-screen { text-align: center; }
  .owl { width: 110px; height: 110px; object-fit: contain; display: block; margin: 0 auto 12px; animation: float 3s ease-in-out infinite; }

  .start-screen h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    color: var(--dark);
    margin-bottom: 10px;
  }
  .start-screen p {
    color: #555;
    font-size: 1rem;
    line-height: 1.6;
    margin-bottom: 8px;
  }

  .level-badges {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    margin: 18px 0;
  }
  .badge {
    font-family: 'Fredoka One', cursive;
    font-size: 0.9rem;
    padding: 6px 14px;
    border-radius: 50px;
    border: 2px solid var(--dark);
    font-weight: 900;
  }
  .badge.a1 { background: #b8f0b8; }
  .badge.a2 { background: #fffaaa; }
  .badge.b1 { background: #ffd6a5; }
  .badge.b2 { background: #ffb3c6; }
  .badge.c1 { background: var(--purple-light); }
  .badge.c2 { background: #a0d4ff; }

  /* QUESTION SCREEN */
  .q-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }
  .q-number {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    color: var(--purple);
    background: #f0e8ff;
    padding: 4px 14px;
    border-radius: 20px;
    border: 2px solid var(--purple);
  }
  .q-level-tag {
    font-size: 0.8rem;
    font-weight: 800;
    padding: 4px 12px;
    border-radius: 20px;
    border: 2px solid var(--dark);
  }

  .question-text {
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    color: var(--dark);
    margin-bottom: 20px;
    line-height: 1.4;
  }

  .blank {
    display: inline-block;
    min-width: 80px;
    border-bottom: 3px solid var(--teal-dark);
    color: var(--teal-dark);
    font-style: italic;
  }

  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .option-btn {
    background: var(--white);
    border: 3px solid var(--dark);
    border-radius: 12px;
    padding: 12px 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s ease;
    box-shadow: 3px 3px 0px var(--dark);
    text-align: left;
    color: var(--dark);
  }
  .option-btn:hover:not(:disabled) {
    background: #f0e8ff;
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0px var(--dark);
  }
  .option-btn:active:not(:disabled) {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0px var(--dark);
  }
  .option-btn.correct {
    background: #b8f0b8;
    border-color: #2d8a2d;
    box-shadow: 3px 3px 0px #2d8a2d;
  }
  .option-btn.wrong {
    background: #ffd6d6;
    border-color: #c0392b;
    box-shadow: 3px 3px 0px #c0392b;
  }
  .option-btn.reveal {
    background: #b8f0b8;
    border-color: #2d8a2d;
    box-shadow: 3px 3px 0px #2d8a2d;
  }
  .option-btn:disabled { cursor: default; }

  .feedback-box {
    margin-top: 16px;
    padding: 12px 16px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 0.95rem;
    border: 2px solid var(--dark);
    display: none;
  }
  .feedback-box.show { display: block; animation: fadeUp 0.3s ease; }
  .feedback-box.correct-fb { background: #b8f0b8; }
  .feedback-box.wrong-fb { background: #ffd6d6; }

  .next-btn {
    margin-top: 16px;
    width: 100%;
    padding: 14px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    background: var(--purple);
    color: var(--white);
    border: 3px solid var(--dark);
    border-radius: 14px;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: all 0.15s ease;
    display: none;
  }
  .next-btn:hover {
    background: #7f55c0;
    transform: translate(-1px, -1px);
    box-shadow: var(--shadow-lg);
  }
  .next-btn.show { display: block; animation: fadeUp 0.3s ease; }

  /* BIG CTA BUTTON */
  .cta-btn {
    display: inline-block;
    padding: 16px 40px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    background: var(--yellow);
    color: var(--dark);
    border: 3px solid var(--dark);
    border-radius: 50px;
    cursor: pointer;
    box-shadow: var(--shadow-lg);
    transition: all 0.15s ease;
    text-decoration: none;
    margin-top: 16px;
  }
  .cta-btn:hover {
    transform: translate(-2px, -2px);
    box-shadow: 8px 8px 0px var(--dark);
  }

  /* RESULTS SCREEN */
  .results-screen { text-align: center; }
  .result-level {
    font-family: 'Fredoka One', cursive;
    font-size: 5rem;
    line-height: 1;
    margin: 16px 0 8px;
  }
  .result-name {
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    color: var(--dark);
    margin-bottom: 12px;
  }
  .score-pill {
    display: inline-block;
    background: var(--yellow);
    border: 3px solid var(--dark);
    border-radius: 50px;
    padding: 8px 24px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }
  .result-desc {
    background: #f8f4ff;
    border: 2px solid var(--purple-light);
    border-radius: 14px;
    padding: 16px;
    font-size: 1rem;
    line-height: 1.6;
    color: #444;
    margin-bottom: 20px;
    text-align: left;
  }
  .guide-rec {
    background: var(--teal);
    border: 3px solid var(--dark);
    border-radius: 16px;
    padding: 18px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  .guide-rec h3 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    color: var(--dark);
    margin-bottom: 6px;
  }
  .guide-rec p {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--dark);
  }

  .breakdown {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 20px;
    text-align: center;
  }
  .breakdown-cell {
    background: var(--white);
    border: 2px solid var(--dark);
    border-radius: 12px;
    padding: 10px 6px;
  }
  .breakdown-cell .blabel {
    font-size: 0.75rem;
    font-weight: 800;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .breakdown-cell .bval {
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    color: var(--dark);
  }

  .retry-btn {
    background: none;
    border: none;
    color: var(--dark);
    font-weight: 800;
    font-size: 0.9rem;
    cursor: pointer;
    text-decoration: underline;
    margin-top: 12px;
    font-family: 'Nunito', sans-serif;
  }

  @media (max-width: 480px) {
    .options { grid-template-columns: 1fr; }
    .breakdown { grid-template-columns: repeat(2, 1fr); }
    .card { padding: 20px; }
  }
</style>
</head>

      <h2>What's your English level?</h2>
      <p>This free grammar test has <strong>30 questions</strong> covering all 6 CEFR levels — from absolute beginner to proficiency.</p>
      <p>At the end, you'll find out your level and get a <strong>personalised grammar guide recommendation</strong>!</p>
      <div class="level-badges">
        <span class="badge a1">A1</span>
        <span class="badge a2">A2</span>
        <span class="badge b1">B1</span>
        <span class="badge b2">B2</span>
        <span class="badge c1">C1</span>
        <span class="badge c2">C2</span>
      </div>
      <p style="font-size:0.9rem;color:#777;">⏱️ Takes about 10 minutes &nbsp;|&nbsp; No sign-up needed</p>
      <button class="cta-btn" onclick="startTest()">Start the Test! ✏️</button>
    </div>`;
}

function startTest() {
  current = 0;
  scores = { A1:0, A2:0, B1:0, B2:0, C1:0, C2:0 };
  document.getElementById('progressWrap').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = questions[current];
  const pct = Math.round(((current) / questions.length) * 100);
  document.getElementById('progressBar').style.width = Math.max(pct, 3) + '%';
  document.getElementById('progressLabel').textContent = `Question ${current + 1} of ${questions.length}`;

  const tagColor = q.tag.replace('bg:', '');

  getCard().innerHTML = `
    <div class="q-meta">
      <span class="q-number">Q${current + 1}</span>
      <span class="q-level-tag" style="background:${tagColor}">${q.level}</span>
    </div>
    <div class="question-text">${q.q.replace('___', '<span class="blank">___</span>')}</div>
    <div class="options" id="optionsGrid">
      ${q.opts.map((o, i) => `<button class="option-btn" onclick="selectAnswer(${i})">${o}</button>`).join('')}
    </div>
    <div class="feedback-box" id="feedbackBox"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
      ${current === questions.length - 1 ? 'See My Results! 🎉' : 'Next Question →'}
    </button>`;
}

function selectAnswer(chosen) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const btns = document.querySelectorAll('.option-btn');
  const fb = document.getElementById('feedbackBox');

  btns.forEach(b => b.disabled = true);
  btns[q.ans].classList.add('correct');

  if (chosen === q.ans) {
    scores[q.level]++;
    btns[chosen].classList.add('correct');
    fb.className = 'feedback-box correct-fb show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${q.exp}`;
  } else {
    btns[chosen].classList.add('wrong');
    fb.className = 'feedback-box wrong-fb show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> The correct answer is <strong>${q.opts[q.ans]}</strong>. ${q.exp}`;
  }

  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showResults();
  } else {
    showQuestion();
  }
}

function showResults() {
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('progressLabel').textContent = 'Complete! 🎉';

  // Determine level: find best scoring level, with tie-breaking by highest level
  const levelOrder = ['A1','A2','B1','B2','C1','C2'];
  // Count questions per level dynamically
  const perLevelMax = {};
  levelOrder.forEach(l => { perLevelMax[l] = questions.filter(q => q.level === l).length; });

  // Calculate percentage per level
  let levelPcts = levelOrder.map(l => ({ l, pct: scores[l] / perLevelMax[l] }));

  // Find the highest level where they scored >= 60%
  let resultLevel = 'A1';
  for (let i = 0; i < levelPcts.length; i++) {
    if (levelPcts[i].pct >= 0.6) resultLevel = levelPcts[i].l;
  }

  const info = levelInfo[resultLevel];
  const totalCorrect = Object.values(scores).reduce((a,b) => a+b, 0);
  const tagColor = questions.find(q => q.level === resultLevel).tag.replace('bg:','');

  getCard().innerHTML = `
    <div class="results-screen">
      <div style="font-size:1rem;font-weight:800;color:#888;text-transform:uppercase;letter-spacing:1px;">Your level is</div>
      <div class="result-level" style="color:${tagColor};-webkit-text-stroke:2px #1a1a2e">${resultLevel}</div>
      <div class="result-name">${info.emoji} ${info.name}</div>
      <div class="score-pill">🎯 You scored ${totalCorrect} / 30</div>

      <div class="breakdown">
        ${levelOrder.map(l => `
          <div class="breakdown-cell">
            <div class="blabel">${l}</div>
            <div class="bval" style="color:${questions.find(q=>q.level===l).tag.replace('bg:','')};-webkit-text-stroke:1px #333">${scores[l]}/${perLevelMax[l]}</div>
          </div>`).join('')}
      </div>

      <div class="result-desc">${info.desc}</div>

      <div class="guide-rec">
        <h3>📖 Recommended for you:</h3>
        <p>${info.guide}</p>
        <p style="font-size:0.85rem;margin-top:4px;">Get your personalised grammar guide with 25 units, clear explanations, and practice exercises!</p>
      </div>

      <a href="#" class="cta-btn">Shop Grammar Guides 🛒</a>
      <br>
      <button class="retry-btn" onclick="showStart()">↩ Take the test again</button>
    </div>`;
}

// Init
showStart();
</script>
